main_results:
  summary: BDS PPP-B2b service can support operational water vapor monitoring with
    PWV accuracy of 3.7-4.7mm RMS vs radiosonde. First demonstration that PPP-B2b-based
    water vapor monitoring meets operational meteorology requirements.
  key_findings:
  - 'PWV RMS: 3.71-4.66mm vs radiosonde'
  - 'PWV RMS: 3.95-4.55mm vs ERA5 reanalysis'
  - Accuracy comparable to CAS real-time ephemeris results
  - PPP-B2b enables standalone water vapor monitoring in areas without internet
  - Meets basic demand for operational meteorology
