formulas:
- formula_id: eq1
  description: Recovery of precise orbit using broadcast ephemeris and PPP-B2b orbital
    corrections in RAC frame.
  variables:
  - X (precise orbit vector)
  - Xbrd (broadcast orbit)
  - er, ea, ec (RAC unit vectors)
  - ΔC = [δCr, δCa, δCc] (PPP-B2b corrections)
  context_quote: 'Precise orbit can consist of broadcast ephemeris and PPP-B2b correction
    (Xu et al. 2021), which is expressed as:'
- formula_id: eq2
  description: Recovery of precise satellite clock offset from broadcast clock and
    PPP-B2b correction.
  variables:
  - t (precise clock)
  - tbrd (broadcast clock)
  - Δt (correction)
  - c (speed of light)
  context_quote: 'The precise satellite clock is recovered by the broadcast ephemeris
    clock and the corrections from the PPP-B2b service as:'
- formula_id: eq3_4
  description: Dual-frequency ionosphere-free pseudorange and carrier phase observation
    equations for PPP.
  variables:
  - ps_r,IFij (OMC pseudorange)
  - ls_r,IFij (OMC carrier phase)
  - Δx (coordinate increments)
  - μs_r (line-of-sight vector)
  - cdtr,IFij (receiver clock offset with IF hardware delay)
  - Zw (wet zenith delay)
  - Ns_r,IFij (ambiguity)
  context_quote: 'The DF IF combination is usually written as:'
- formula_id: Eq6
  description: 'Stochastic model: elevation-dependent weighting with URA from PPP-B2b'
  variables:
  - F (satellite system error factor)
  - Rr (code/carrier phase error ratio)
  - a_σ, b_σ (carrier-phase error factors)
  - E (elevation angle)
  - σ_eph (URA from PPP-B2b)
  - m (number of satellites)
  context_quote: 'the weight W can be expressed as

    {

    W= diag(σ−2, σ−2, σ−2, ⋯, σ−2)

    σ2 = FRr(aσ2+ bσ2/sin E2) + σ2eph

    }

    where F is the satellite system error factor; Rr indicates code/carrier phase
    error ratio; aσ and b2σ are carrier-phase error factors a and b (m); E illustrates
    elevation angle; σeph is the URA from the PPP-B2b service; m is the number of
    satellites.'
- formula_id: Eq7
  description: Receiver clock offset expressed as difference between local time and
    BDT
  variables:
  - D_u (user clock difference)
  - T_local
  - BDT
  context_quote: Du = Tlocal − BDT
- formula_id: Eq8
  description: Time transfer between two stations as difference of local times
  variables:
  - ΔT
  - T1, T2
  context_quote: ΔT = D1−D2 = T1 −BDT −(T2 −BDT) = T1 −T2
- formula_id: Eq_8
  description: Removes the difference in the reference for time transfer.
  variables: []
  context_quote: the difference in the reference was removed by using (8) for the
    time transfer
