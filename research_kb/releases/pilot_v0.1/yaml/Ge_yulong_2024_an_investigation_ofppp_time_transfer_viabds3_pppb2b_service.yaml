  grounding_quotes:
  - We collected 29 days of experimental data and compared it with the Centre National
    d’Etudes Spatiales (CNES) real-time products.
  - time transfer based on BDS-3, GPS, and BDS-3/GPS PPP was investigated.
  - BDS-3 can now provide PPP-B2b service via B2b signals to Asia by three BDS-3 GEO
    satellites (CSNO 2020a, b).
  - PPP time transfer with the PPP-B2b correction.
  - receiving the BDS-3 or GPS pseudorange and phase observation and 3 GEO satellite
    signals for decoding PPP-B2b corrections.
  - To test and investigate the performance of real-time PPP time transfer with the
    PPP-B2b service
  - For CNES real-time GPS products, the orbit errors agree with each other at the
    RAC direction
  - The precision of GPS orbit in PPP-B2b is obviously worse than that of CNES
  - The precise products will be recovered with LANV and CNAV1 broadcast ephemeris
    and the PPP-B2b correction.
  - The CNES real-time products were received and recovered by BNC software
  - Final products and ultra-rapid products released from Wuhan university were downloaded
    from ftp://igs.gnsswhu.cn/.
  - The time transfer based on PPP using the PPP-B2b service was investigated and
    compared with PPP using WUM, WUU, and CNES products.
  - Below B2b indicates the real-time products recovered from the PPP-B2b correction.
  - the receiver clock offset based on the four products does not coincide very well,
    which can be further proved in Fig. 8. Especially in Fig. 8, we find that the
    time series of receiver offset using B2b is disorderly and discontinuous, which
    is because the reference of GPS in B2b is not the same clock.
  - the receiver clock offset based on the four products does not coincide very well
  - PPP time transfer using B2b is significantly better than the current that of PPP
    based on IGS RTS products in terms of reliability.
  - PPP using the CNES real-time products
  - PPP with WUM, CNES, and WUU products
  - GPS PPP with the PPP-B2b is significantly worse than GPS PPP with CNES, WUU, and
    WUM products.
  - the PPP-B2b correction
  - B2b products
  - PPP-B2b correction
  - B2b correction
  - BDS-3 PPP with B2b presents a very smooth and continuous time series
  - PPP based on BDS-3 with B2b, WUM, CNES, and WUU products
  - BDS-3 PPP using B2b, CNES, WUM, and WUU products
  - Time transfer based on BDS-3 PPP using B2b, WUM, and CNES products and the reference
  - 29-day PPP-B2b corrections were collected and recovered to the precise product.
  - the PPP-B2b service is provided by BDS-3 for users in China.
  - BDS-3 PPP using the PPP-B2b, WUM, CENS, and WUU products
  - time transfer from BDS-3 PPP using the PPP-B2b, WUM, CENS, and WUU products are
    0.30, 0.14, 0.35, and 0.54 ns, respectively
  - BDS-3 PPP using the PPP-B2b products have better reliability because it sometimes
    does not re-converge due to Internet instability
  - time transfer obtained from GPS PPP using the PPP-B2b products (0.89 ns)
  - BDS-3 PPP using B2b products (Fig. 20)
  - the PPP-B2b, CNES, WUU, and WUM products (Table 7)
