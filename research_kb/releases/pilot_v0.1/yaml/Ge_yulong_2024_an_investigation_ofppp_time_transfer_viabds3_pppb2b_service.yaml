  - 'the weight W can be expressed as

    {

    W= diag(σ−2, σ−2, σ−2, ⋯, σ−2)

    σ2 = FRr(aσ2+ bσ2/sin E2) + σ2eph

    }

    where F is the satellite system error factor; ... σeph is the URA from the PPP-B2b
    service'
  - The receiver clock offset was regarded as white noise to estimate.
  - Estimator Kalman filter
  - 'Signals BDS-3: B1I/B3I GPS: L1/L2'
  - Precise products Broadcast ephemeris (CNAV1 or LNAV) + PPP-B2b correction
  - Receiver clock offset Estimated with a white noise model (10^4 m^2)
  - 'Tropospheric delay ZHD: corrected (Saastamoinen 1972) ZWD: estimated with a random
    walk noise model (3×10^–8 m^2/s)'
  - Phase ambiguities Estimate as constant at each arc; When cycle-slip happened,
    estimated as white noise model (10^4 m^2)
  - Receiver coordinates Estimate as constant
  - for the BDS-3/GPS PPP model, an inter-system bias (ISB) parameter will be added.
  - After the filter update, we check the observation residuals for each satellite.
