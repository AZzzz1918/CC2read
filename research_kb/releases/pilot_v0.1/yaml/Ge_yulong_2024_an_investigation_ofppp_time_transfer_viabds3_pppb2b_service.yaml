  processing_mode: DUAL_FREQUENCY_IF_COMBINATION
  observation_model: Dual-frequency ionosphere-free pseudorange and carrier phase
    combination
  state_vector:
  - coordinate increments Δx
  - receiver clock offset cdtr,IFij
  - wet zenith delay Zw
  - carrier phase ambiguity Ns_r,IFij
  - NOT_MENTIONED
  - receiver clock offset (white noise model, 10^4 m^2)
  - tropospheric ZWD (random walk noise, 3×10^-8 m^2/s)
  - phase ambiguities (constant per arc, white noise reinitialization on cycle-slip,
    10^4 m^2)
  - receiver coordinates (constant)
  - inter-system bias (ISB) for BDS-3/GPS model
  stochastic_model: elevation-dependent weighting with system error factor and URA
    from PPP-B2b
  estimator: Kalman filter
  grounding_quotes:
  - 'DF IF combination is usually employed for PPP (Tu et al. 2019). The DF IF combination
