  grounding_quotes:
  - Little has been published on time transfer with the PPP-B2b; hence, the performance
    of BDS-3, GPS, and BDS-3/GPS PPP time transfer with the PPP-B2b service will be
    investigated in this contribution.
technical_route:
  overall_flow: Collect 29 days of data; analyze orbit and clock quality of PPP-B2b;
    perform PPP time transfer with B2b and CNES products for BDS-3, GPS, and BDS-3/GPS;
    compare results.
  key_steps:
  - Data collection (29 days)
  - Satellite orbit and clock quality analysis (PPP-B2b)
  - PPP time transfer using PPP-B2b (BDS-3, GPS, combined)
  - Comparison with CNES real-time products
  - Combine broadcast ephemeris with PPP-B2b orbit/clock corrections
  - Apply OSB corrections to pseudorange observations
  - Formulate dual-frequency IF observation equations
  - Estimate receiver clock offset for time transfer
  - Decode PPP-B2b corrections from 3 GEO satellite signals
  - Recover precise orbit and clock using broadcast ephemeris and PPP-B2b corrections
  - Apply OSB correction to pseudorange
  - Perform ionosphere-free PPP to estimate receiver clock offset
  - Calculate time difference between BDT and local time, then between stations
  - Recover precise products using PPP-B2b corrections and broadcast ephemeris (LANV,
    CNAV1)
  - Receive CNES real-time products with BNC software
  - Download WUU and WUM products from Wuhan University FTP
  - Perform PPP time transfer for BDS-3, GPS, and combined BDS-3/GPS systems
  - Compare results to IGS final clock products
  - PPP-B2b correction recovery
  - Kalman filter PPP processing using BDS-3/GPS observations
  - Time transfer using estimated receiver clock offsets
  - Comparison with reference products (WUM, WUU, CNES)
  - Evaluation with STD and MDEV metrics
  - After the filter update, check observation residuals for each satellite.
  - If residual exceeds threshold, reduce the weight of the abnormal observation and
    restart the filter.
  - If still not qualified, eliminate the satellite with too large residuals.
  - PPP processing using B2b, CNES, WUM, WUU corrections
  - Time transfer via common clock difference method (Formula 8)
  - Compare availability percentages (Table 3)
  - Compute STD and mean of the difference between time transfer solutions and reference
  - Collection of BDS-3 PPP-B2b corrections over 29 days
  - Recovery of precise orbit and clock products from B2b corrections
  - Quality assessment of GPS and BDS-3 orbit/clock errors using WUM as reference
  - PPP processing with B2b, CNES, WUU, and WUM products for GPS-only, BDS-3-only,
    and combined constellations
  - Convergence time evaluation (horizontal < 0.1 m, vertical < 0.2 m)
  - Time transfer analysis using modified Allan deviation (MDEV) and receiver clock
    offset series
  - Recover satellite clock/orbit corrections from PPP-B2b and other products
  - Perform BDS-3, GPS, and BDS-3/GPS PPP processing
  - Compute receiver clock offsets for stations (e.g., CUSV)
  - Perform time transfer between stations (CUSV-USUD)
  - Evaluate precision (STD) and frequency stability
  tools_software:
  - NOT_MENTIONED
  - BNC software
  - MG-APP
  grounding_quotes:
