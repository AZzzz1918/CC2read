    d’Etudes Spatiales (CNES) real-time products. The quality of the satellite's orbit
    and clock was analyzed first. Then, time transfer based on BDS-3, GPS, and BDS-3/GPS
    PPP was investigated.
  - The method of recovery of precise clock offset and orbit will be presented first,
    followed by PPP time transfer with the PPP-B2b.
  - The quality of real-time products will then be assessed and analyzed. Next, the
    experimental dataset and the processing strategies are described in detail. Following
    that is the investigation and validation of PPP time transfer with the PPP-B2b
    correction.
  - For each station, receiving the BDS-3 or GPS pseudorange and phase observation
    and 3 GEO satellite signals for decoding PPP-B2b corrections.
  - Based on BDS-3 CNAV1 and GPS LNAV broadcast ephemeris and decoded the PPP-B2b
    correction, precise orbit and clock offset are then recovered.
  - Note that the OSB correction will be corrected directly for pseudorange at each
    frequency.
  - the time difference between BDT and the local time will be estimated directly
    by using the corresponding PPP model.
  - Finally, the time transfer solutions can be obtained directly using Eq. (8).
  - The precise products will be recovered with LANV and CNAV1 broadcast ephemeris
    and the PPP-B2b correction.
  - The CNES real-time products were received and recovered by BNC software
  - The time transfer based on PPP using the PPP-B2b service was investigated and
    compared with PPP using WUM, WUU, and CNES products.
  - Estimator Kalman filter
  - Receiver clock offset Estimated with a white noise model
  - After the filter update, we check the observation residuals for each satellite.
    If the residual of the certain satellite exceeds, the weight of this abnormal
    observation is reduced, and re-start the filter. If the result is still not qualified,
    we will further eliminate the satellite with too large residuals.
  - the difference in the reference was removed by using (8) for the time transfer
  - Table 3, which exhibits the availability percentages for PPP solutions with each
    precise product
  - the STD and mean values of the difference between time transfer solutions and
    the reference are calculated and listed in Table 4
  - 29-day PPP-B2b corrections were collected and recovered to the precise product.
  - Then, the BDS-3 and GPS orbit and clock released by CNES and PPP-B2b products
    were assessed by using WHU final products (WUM) as the reference.
  - Here, the mean convergence times for PPP with the PPP-B2b, CNES, WUU, and WUM
    products at different schemes are calculated and listed in Table 7.
  - We use the positioning error ... to calculate the convergence time, which is defined
    as the time when the horizontal and the vertical positioning error fall within
