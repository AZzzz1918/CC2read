    and clock offset. At the same time, the dual-frequency PPP performance of the
    augmented service is evaluated.
- experiment_id: exp1
  description: Accuracy analysis of QZSS L6 augmented real-time orbit and clock error
    for GPS satellites
  setup: Real-time L6 orbit/clock vs. QZSS precise orbit (15 min) and clock (5 min)
    as reference; coordinate system ITRF2008, time GPST, IGS14 antenna file for phase
    center correction.
  conditions: DOY 258-260, 2019
  grounding_quotes:
  - Relevant data of DOY 258-260 days in 2019 were selected for experiments to analyze
    the augmented orbit and clock difference accuracy.
  - GPS precise orbits with an epoch interval of 15 min and precise clock offset with
    an epoch interval of 5 min provided by QZSS were selected as references (https://sys.qzss.go.jp/dod/en/archives/pnt.html).
