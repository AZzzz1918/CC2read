main_results:
  summary: Static PPP using L6 signal achieves centimeter-decimeter level positioning
    but with lower accuracy than QZSS final products. The degradation is attributed
    to the fact that CLAS orbit/clock corrections are not real-time precise corrections
    for standard PPP (they are optimized for PPP-RTK).
  key_findings:
  - The accuracy of orbit and clock augmented by L6 signal is still lower than QZSS
    final products.
  - Static PPP using L6 signal can reach centimeter-decimeter level positioning.
  - The gap arises because CLAS PPP augmented service is out of scope of its pre-service;
    the published orbit/clock corrections are not real-time precise corrections.
  - 'CLAS clock error RMS: 0.15-0.65m'
  - 'Radial orbit error average: 0.26m'
  - 'SISURE average: 0.62m, but up to 1.7m for G10'
  - Orbit and clock corrections are not precise individually, but combined along line-of-sight
    may be optimized for PPP-RTK
  - CLAS augmented positioning error in E direction is at cm level, but fluctuates
    greatly in N direction (centimeter-decimeter).
  - Horizontal accuracy of four stations fluctuates between centimeters and decimeters.
  - Convergence rate using QZSS final precise ephemeris and clock product is significantly
    faster than that of CLAS augmented positioning.
  - PPP positioning results of final precise products are better than CLAS augmented
    results.
  - CLAS plan converges to 20cm (E,N) and 40cm (U) at about 420 epochs (30s).
  - RMS statistics are shown in Table 4 (not provided in this chunk).
  - 'Clock offset precision after augmentation: 0.46m'
  - 'Orbit 3D precision after augmentation: 1.44m'
  - Static PPP horizontal accuracy ~13cm, vertical ~16cm
  - Still large error compared to QZSS final precise products
  - Need further research on PPP-RTK performance of L6D and PPP performance of L6E
  limitations:
  - CLAS corrections are not designed for standard PPP, leading to lower accuracy
    compared to final products.
  - Only static PPP mode was tested.
  - Orbit and clock corrections have relatively large errors compared to IGS-RTS
  - Some satellites (G10, G21) show significant fluctuations
  - Only four stations over three days
  - CLAS augmentation has lower accuracy and slower convergence than final products
  - PPP results with L6D still have large errors compared to final products
  - PPP-RTK potential not fully assessed
  - Limited to static PPP evaluation
  grounding_quotes:
