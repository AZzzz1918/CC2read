  - Precise Point Positioning Performance Evaluation of QZSS Centimeter Level Augmentation
    Service
  - The Japanese Quasi-Zenith Satellite System(QZSS) provides Centimeter-Level Augmentation
    Service(CLAS) through L6 signal.
  - Based on the measured data of AIRA, STK2, TSK2 and USUD of four MGEX stations
    in Japan, this paper analyzes the PPP augmentation performance of L6 augmentation
    signal by post static PPP, and compares it with the calculation results of QZSS
    final orbit and clock products.
  - QZSS mainly releases augmented information in the form of RTCM-SSR, including
    correction information of satellite orbit and clock error, phase bias, code bias,
    ionosphere, etc.
  - Centimeter-Level Augmentation Service (CLAS)
  - The L6 signal herein refers to the L6D signal for CLAS service.
  - This paper mainly introduces the CLAS augmented service based on QZSS L6D signals
  - CLAS augments the service by broadcasting L6D augmentation information on L6 frequency
    band
  - L6 signals are stored in SSR format using RTCM 10403.2 standard. L6 files are
    published hourly and can be downloaded from the official QZSS website (https://sys.qzss.go.jp/dod/en/archives/agree.html).
