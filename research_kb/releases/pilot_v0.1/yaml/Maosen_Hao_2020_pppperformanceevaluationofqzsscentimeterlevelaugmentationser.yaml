- experiment_id: exp1
  description: PPP evaluation of QZSS CLAS L6D corrections over DOY 258-260 on four
    Japanese stations
  setup: 'Two PPP plans: CLAS plan using broadcast + CLAS corrections, QZSS plan using
    QZSS final products; both dual-frequency IF, 15° cut-off, no ambiguity fixing'
