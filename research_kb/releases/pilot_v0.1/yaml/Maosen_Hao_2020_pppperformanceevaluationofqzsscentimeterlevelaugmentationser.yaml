research_problem:
  problem_statement: Evaluate the PPP augmentation performance of QZSS CLAS L6 signal
    and compare it with QZSS final orbit and clock products.
  research_questions:
  - What is the accuracy of orbit and clock augmented by L6 signal compared to final
    products?
  - Can static PPP based on L6 signal achieve centimeter-decimeter level positioning?
  - Why does a gap exist between CLAS augmented products and final products?
  - 评估增强轨道和钟差的SIS用户测距误差
  - 评估双频PPP定位性能
  - What is the accuracy of real-time orbit and clock corrections from QZSS L6 augmentation?
  - What is the accuracy of CLAS augmented GPS orbit and clock offset?
  - What is the PPP accuracy after CLAS augmentation?
  - How does CLAS augmentation compare to using QZSS final precise ephemeris and clock
    products?
  - What is the accuracy of static PPP using QZSS L6D augmentation?
  - How does it compare to using QZSS final orbits and clocks?
  knowledge_gap: CLAS is designed for PPP-RTK service, and its PPP augmented service
    is out of scope of its pre-service, potentially limiting positioning accuracy
    for standard PPP.
