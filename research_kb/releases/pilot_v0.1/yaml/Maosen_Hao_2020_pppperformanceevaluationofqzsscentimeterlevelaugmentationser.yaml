experiments:
- experiment_id: exp1
  description: Static PPP performance evaluation using QZSS CLAS L6 signal and comparison
    with QZSS final products.
  setup: 'Four MGEX stations in Japan: AIRA, STK2, TSK2, USUD; post-static PPP processing.'
  conditions: L6 augmentation messages applied; comparison with QZSS final orbit and
    clock products.
  grounding_quotes:
  - Based on the measured data of AIRA, STK2, TSK2 and USUD of four MGEX stations
    in Japan, this paper analyzes the PPP augmentation performance of L6 augmentation
    signal by post static PPP, and compares it with the calculation results of QZSS
    final orbit and clock products.
- experiment_id: Exp1
  description: 评估CLAS改正数的SIS用户测距误差和双频PPP性能
