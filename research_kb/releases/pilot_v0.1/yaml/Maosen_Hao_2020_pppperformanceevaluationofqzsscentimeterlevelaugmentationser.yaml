  - 'R: broadcast satellite position'
  - 'ΔX, ΔY, ΔZ: ECEF corrections'
  context_quote: R R R e e e Z Y X c a r c a r , ,
- formula_id: '2.2'
  description: Precise satellite position after applying corrections.
  variables:
  - 'X0, Y0, Z0: broadcast ECEF position'
  - 'ΔX, ΔY, ΔZ: ECEF corrections'
  - 'X, Y, Z: corrected position'
  context_quote: Z Y X Z Y X Z Y X Δ Δ Δ − = 0 0 0
- formula_id: '2.3'
  description: Real-time precise clock error recovery.
  variables:
  - 'C0: clock correction parameter'
  - 't_g: broadcast satellite clock difference'
  - 'c: speed of light'
  - 't_s: corrected satellite clock difference'
  context_quote: c C t t g s 0 − =
- formula_id: eq2.4
  description: SISURE formula
  variables:
  - ω_R
  - ω_A,C
  - ΔR
  - ΔA
  - ΔC
  - c
  - dt
  context_quote: In Equation (2.4), ω_R and ω_A,C are the contribution factors of
    radial direction R and along-track direction A and cross-track direction C, c
    are the speed of light, dt are the error of satellite clock, and ΔR, ΔA, ΔC are
    the errors in the radial direction, along-track direction and cross-track direction
    of orbit, respectively.
