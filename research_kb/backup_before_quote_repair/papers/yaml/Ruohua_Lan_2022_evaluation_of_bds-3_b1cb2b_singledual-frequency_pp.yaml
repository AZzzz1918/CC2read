main_results:
  summary: PPP-B2b orbits have radial accuracy 9.42 cm, along 21.26 cm, cross 28.65
    cm, slightly lower than IGS RTS orbits. PPP-B2b clock accuracy 0.18 ns is better
    than IGS RTS. Static B1I+B3I and B1C PPP achieve centimeter-level accuracy with
    PPP-B2b, but horizontal components are slightly worse than IGS RTS. Dynamic B1I+B2b
    PPP yields ~50 cm horizontal, ~120 cm vertical accuracy.
  key_findings:
  - PPP-B2b orbit accuracy is 9.42 cm (radial), 21.26 cm (along), 28.65 cm (cross),
    slightly lower than IGS RTS orbits.
  - PPP-B2b clock bias accuracy is 0.18 ns, higher than IGS RTS.
  - Static B1I+B3I and B1C PPP with PPP-B2b achieve centimeter-level 3D accuracy,
    but horizontal accuracy is slightly lower than IGS RTS.
  - Dynamic B1I+B2b PPP accuracy is about 50 cm horizontal and 120 cm vertical, similar
    to B2b single-frequency PPP.
  - BDS-3 has on average 8.4, 8.1, 7.8, 8.1 visible satellites with PDOP 2.1, 2.2,
    2.9, 2.3.
  - GPS has fewer visible satellites (6.8, 7.1, 6.8, 6.6) with slightly higher PDOP
    values.
  - 'PPP-B2b BDS-3 orbit RMSE: ~20 cm radial, ~50 cm along-track/cross-track.'
  - PPP-B2b clock STD within 0.2 ns for BDS MEO.
  - B2b corrected GPS clock STD is 0.3 ns.
  - Fluctuations of B2b-corrected and broadcast orbit errors in cross-track are larger
    than other real-time products.
  - Systematic biases exist among different real-time clock products, including B2b
    corrected BDS and GPS clocks.
  - BDS-3 PPP-B2b orbit radial RMSE 9.42 cm, along-track 21.26 cm, cross-track 28.65
    cm.
  - BDS-3 PPP-B2b clock STD 0.18 ns, 79.87% improvement over broadcast ephemeris.
  - BDS-3 dual-frequency static PPP positioning accuracy within 4.6 cm in E, N, U
    directions.
  - GPS B2b-corrected PPP accuracy about 5.3 cm, limited by orbit and clock accuracy.
  - Positioning accuracy in N component better than E component due to BDS-3 north-south
    ground tracks.
  - BDS-3 PPP-B2b horizontal 4.8 cm, 3D 5.4 cm
  - GPS PPP slightly less accurate
  - WHU RTS best horizontal (1.1 cm), CAS best 3D (1.9 cm), DLR worst (3.5, 3.9 cm)
  - BDS-3 dual-frequency PPP-B2b static 2D accuracy is 4.8 cm, 3D accuracy 5.4 cm.
  - BDS-3 PPP-B2b converges within 15 min, significantly faster than GPS PPP-B2b (52
    min average).
  - Single-frequency BDS B1C PPP-B2b RMSE better than 5.5 cm in E, N, U, similar to
    IGS RTS.
  - Single-frequency RT-PPP using PPP-B2b SSR products achieves horizontal accuracy
    of 5.4 cm and 3D accuracy of 7.7 cm for B1C.
  - IGS RTS WHU products provide the best horizontal accuracy (3.5 cm) among tested
    IGS RTS products.
  - IGS RTS DLR products provide the worst accuracy (5.5 cm horizontal, 14.3 cm 3D).
  - Broadcast ephemeris-only solutions exceed 39.5 cm maximum error in three components.
  - PPP-B2b single-frequency BDS-3 B1C PPP horizontal accuracy 5.4 cm (2D), 3D 7.7
    cm.
  - PPP-B2b GPS L1 PPP 2D 5.4 cm, 3D 7.8 cm.
  - CAS RTS gave shortest convergence time (65 min); DLR slowest (95 min).
  - Broadcast ephemeris accuracy much worse (2D 18.3 cm, 3D 43.5 cm).
  - Real-time vehicle dynamic test with jammer sustained PPP-B2b performance, reference
    from GPS+BDS RTK/INS.
  - 'Average BDS-3 visible satellites: 8.9, GPS: 2.0'
  - 'Average PDOP: BDS-3 6.3, GPS 2.4'
  - GNSS jammer caused sharp fluctuations in visibility and PDOP
  - Signal blockage leading to zero visible satellites causes PPP re-convergence.
  - B1I+B2b dual-frequency PPP-B2b re-converged to 0.5 m horizontal and 1.0 m vertical
    accuracy.
  - Re-convergence time was 85 seconds with an average PDOP of 2.2.
  - PPP-B2b dual-frequency 3D RMSE 137.9 cm, superior to broadcast ephemeris (182.4
    cm) but worse than best IGS RTS (129.7 cm).
  - GPS dual-frequency PPP had highest 3D accuracy (126.0 cm) but worst horizontal
    accuracy (74.5 cm) among SSR products.
  - Single-frequency B2b PPP using PPP-B2b products achieved 3D RMSE 139.2 cm, smoother
    than dual-frequency after re-tracking.
  - A systematic error in N and U components exists in single-frequency PPP, attributed
    to unabsorbed satellite clock errors.
  - real-time WHU orbits and clock products have similar accuracy to other ACs
  - single frequency PPP with WHU products has lower positioning accuracy
  - WHU BDS real-time clock products contain systematic errors
  - RMSE of WHU BDS real-time clock products is larger than that of other products
  - PPP-B2b orbit accuracy is lower than IGS RTS (CAS, DLR, GFZ, WHU), but clock accuracy
    is better.
  - BDS-3 real-time orbit and clock from PPP-B2b are more accurate than GPS.
  - Static dual-frequency B1I+B3I PPP using PPP-B2b achieves cm-level accuracy, better
    than GPS L1+L2.
  - Static single-frequency B1C PPP using PPP-B2b achieves 10-20 cm accuracy.
  - Vehicle-borne dual-frequency B1I+B2b PPP achieves submeter-level (horizontal)
    and meter-level (vertical).
  - IGS RTS is more accurate but requires internet; PPP-B2b uses navigation signal
    broadcast with inter-satellite link technology.
  limitations:
  - NOT_MENTIONED
  - Systematic clock bias not fully explained; attributed to pseudorange observation
    and ambiguity absorption.
  - IGSO satellite orbit accuracy lower than MEO, especially with GFZ SSR corrections.
  - DLR did not provide SSR corrections for IGSO satellites C38, C39, C40, reducing
    completeness.
  - Positioning accuracy still lower than IGS real-time products.
  - Accuracy lower than IGS RTS
  - Only four MGEX stations used.
  - No description of correction latency or availability.
  - No explicit modeling or quantification of tropospheric errors.
  - No uncertainty bounds or 95% confidence metrics reported.
  - Only one day of dynamic data.
  - Static station names and number not disclosed in this chunk.
  - Single-frequency ionospheric handling not described.
  - Performance degradation under poor observation conditions.
  - Single-frequency PPP suffers from unabsorbed satellite clock errors causing systematic
    biases.
  - In dynamic environments, positioning accuracy among different products became
    similar.
  - IGS RTS products are limited by internet connection.
  - Orbit accuracy of PPP-B2b is lower than IGS RTS.
  grounding_quotes:
  - Results illustrate that the orbits accuracies of PPP-B2b orbits are 9.42 cm, 21.26
    cm, and 28.65 cm in the radial, along-track, and cross-track components, which
    are slightly lower than those of real-time orbits provided by the four IGS centers.
  - the accuracy of PPP-B2b clock biases is 0.18 ns, which is higher than those provided
    by IGS Real-Time Service (RTS).
  - the 3D positioning accuracy of B1I+B3I dual-frequencies PPP and B1C single-frequency
    PPP are centimeter-level while using PPP-B2b service, which is slightly lower
    in horizontal components compared to those obtained based on IGS RTS products.
  - the positioning accuracies of B1I+B2b dual-frequency PPP are about 50 cm and 120
    cm in horizontal and vertical components, which are close to those of B2b single-frequency
    PPP using PPP-B2b service.
  - The number of available BDS-3 satellites on average are 8.4, 8.1, 7.8, and 8.1,
    with the corresponding PDOP of 2.1, 2.2, 2.9, and 2.3 for JFNG, ULAB, URUM, and
    WUH2 stations.
  - For GPS, the average number of available satellites are 6.8, 7.1, 6.8, and 6.6,
    with the corresponding PDOP of 2.5, 2.6, 2.9, and 2.7
  - The RMSE of BRDC, PPP-B2b for BDS-3, are about 20 cm in the radial component and
    50 cm in the along-track and cross-track components
  - the STD of PPP-B2b is within 0.2 ns
  - The STD of the B2b corrected GPS clock is 0.3 ns.
  - in the cross-track direction, however, the fluctuations of B2b-corrected and BDS
    broadcast orbit errors are more significant than those of other real-time products.
  - systematic biases existed among different real-time clock products, especially
    the B2b corrected BDS and GPS clocks.
  - the statistic orbit accuracies of the IGSO satellites, C38~C40, are much lower
    than those of MEO satellites
  - The RMSE of the BDS-3 PPP-B2b orbits in the radial, along-track, and cross-track
    components are 9.42 cm, 21.26 cm, and 28.65 cm, respectively.
  - The STD of PPP-B2b clocks is 0.18 ns
  - the positioning accuracy of BDS-3 dual-frequency PPP based on the PPP-B2b real-time
    products is within 4.6 cm in the three directions
  - the GPS dual-frequency PPP with B2b correction is about 5.3 cm
  - the positioning accuracy of PPP-B2b-based positioning in the N component is higher
    than in the E component
  - The positioning accuracies of BDS-3 PPP with PPP-B2b service are 4.8 cm and 5.4
    cm in horizontal and 3D components, respectively.
  - the solution based on the products of WHU has the highest accuracy in horizontal
    components with 1.1 cm. In comparison, the solution based on the CAS products
    has the highest accuracy in 3D with 1.9 cm. The solutions based on DLR real-time
    products present the worst accuracy with 3.5 cm and 3.9 cm
  - the B1I+B3I BDS-3 PPP based on PPP-B2b SSR corrections can provide users with
    centimeter-level static positioning solutions, which is close to these based on
    IGS RTS SSR corrections
  - The convergence times of BDS-3 PPP based on PPP-B2b products are within 15 min.
  - The PPP-B2b-based GPS PPP presents the slowest convergence time
  - The positioning accuracy in terms of RMSE of BDS B1C PPP with PPP-B2b SSR products
    is better than 5.5 cm
  - While using PPP-B2b SSR products, the position accuracies in horizontal and 3D
    of B1C PPP are 5.4 cm and 7.7 cm, respectively.
  - While using the IGS RTS products, the B1C PPP based on WHU products provides the
    highest accuracy within 3.5 cm in horizontal, and the PPP based on GFZ products
    provides the highest accuracy in 3D with 7.0 cm among evaluated the IGS RTS products.
  - the DLR real-time products provide the worst static B1C PPP positioning accuracy
    with 5.5 cm and 14.3 cm in the horizontal and 3D.
  - maximum positioning error for broadcast ephemeris-based solution exceeds 39.5
    cm in the three components.
  - horizontal/3D positioning accuracies using WHU ultra-rapid products and broadcast
    ephemeris were about 7.6/13.1 cm and 18.3/43.5 cm
  - the average convergence times of BDS-3 B1C PPP and GPS L1 PPP using PPP-B2b SSR
    products are 80 min and 73 min
  - 'B2b BDS / B2b GPS: E 4.6/4.6, N 2.8/2.9, U 5.5/5.6, 2D 5.4/5.4, 3D 7.7/7.8'
  - CAS’s products are the shortest among other products, with an average time of
    65 min. The DLR products-based solutions converge the slowest with an average
    time of 95 min.
  - The average number of visible BDS-3 and GPS satellites during the 4-h dynamic
    test in Beijing are 8.9 and 2.0, respectively, and the average corresponding PDOP
    value of BDS-3 and GPS are 6.3 and 2.4, respectively.
  - The sharp changes in the number of visible satellites are affected by the equipped
    GNSS jammer and further affect the PDOP values.
  - the presence of significant error components coincided with epochs of poor observations,
    which results in positioning discontinuity and further leads to PPP re-convergence.
  - At epoch 3589, the number of visible satellites is 8, and the positioning error
    at E, N, and U components are 4 m, −2 m, and −4 m, respectively.
  - the B1I+B2b combination PPP with PPP-B2b converged to 0.5 and 1.0 m positioning
    accuracy in both horizontal and vertical components. The convergence time is 85
    s in this period, and the average PDOP value is 2.2.
  - the positioning accuracy of the BDS-3 B1I+B2b PPP using PPP-B2b SSR products is
    35.8 cm, 55.0 cm, and 121.3 cm in the E, N, and U components
  - The solutions based on broadcast ephemeris (67.5 cm and 182.4 cm in horizontal
    and 3D components) have the worst positioning accuracy among the seven products.
  - The GPS L1+L2 PPP solution has the highest 3D accuracy (126.0 cm) and the worst
    horizontal accuracy (74.5 cm)
  - a noticeable systematic error exists in the N and U components, which are caused
    by the unabsorbed satellite clock errors
  - affected by the complex positioning environment, the positioning accuracy of various
    products is similar
  - the accuracies of the real-time WHU orbits and clock products are similar to other
    ACs, but the positioning of single frequency PPP with WHU products is lower than
    that of other ACs
  - This is because the WHU BDS real- time clock products contain systematic errors
  - the RMSE value of WHU BDS real-time products is more significant than that of
    other products
  - the orbit accuracy of PPP-B2b SSR products is lower than these of IGS real-time
    products (CAS, DLR, GFZ, and WHU). However, the clock accuracy of PPP-B2b is better
    than these of IGS real-time products.
  - the accuracy of the real-time orbit and clock of BDS-3 provided by PPP-B2b is
    higher than that of GPS.
  - the BDS-3 B1I+B3I PPP positioning accuracy using the PPP-B2b service is centimeter-level
    which is better than that of GPS L1+L2 PPP.
  - the dual-frequency B1I+B2b PPP positioning accuracy in the vehicle-borne test
    achieved submeter-level and meter-level in horizontal and vertical components
  - IGS RTS are limited by the connection of the internet. Additionally, BDS-3 PPP-B2b
    introduces inter-satellite link technology and broadcasts SSR information by navigation
    signal, which gives it more significant potential
