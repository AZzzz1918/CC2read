experiments:
- experiment_id: exp1
  description: Static PPP test using B1I+B3I dual-frequency and B1C single-frequency
    with PPP-B2b and IGS RTS products.
  setup: NOT_MENTIONED
  conditions: NOT_MENTIONED
  grounding_quotes:
  - In the static positioning test, the 3D positioning accuracy of B1I+B3I dual-frequencies
    PPP and B1C single-frequency PPP are centimeter-level while using PPP-B2b service
- experiment_id: exp2
  description: Dynamic vehicle test using B1I+B2b dual-frequency and B2b single-frequency
    PPP with PPP-B2b service.
  setup: NOT_MENTIONED
  conditions: NOT_MENTIONED
  grounding_quotes:
  - the positioning accuracies of B1I+B2b dual-frequency PPP are about 50 cm and 120
    cm in horizontal and vertical components, which are close to those of B2b single-frequency
    PPP using PPP-B2b service.
- experiment_id: exp1
  description: Kinematic RT-PPP test using B1C+B2b observations collected in Beijing,
    China
  setup: NOT_MENTIONED
  conditions: NOT_MENTIONED
  grounding_quotes:
  - The performance of the kinematic dual-and single-frequency RT-PPP is analyzed
    with B1C+B2b observation data collected in Beijing, China.
- experiment_id: EXP_4day_static_dynamic
  description: Four-day data collection to compare PPP-B2b and IGS RTS orbit/clock
    accuracy; PPP-B2b positioning on dual-frequency and single-frequency PPP in static
    and dynamic tests.
  setup: Four MGEX stations (URUM, ULAB, WHU2, JFNG); real-time orbit/clock SSR from
    PPP-B2b and IGS collected via BNC; ultra-rapid products from WHU, broadcast ephemeris.
  conditions: DOY 354-357, 2021
  grounding_quotes:
  - we collected four-day data to compare the accuracies of PPP-B2b orbit and clock
    to those of IGS RTS products. The positioning accuracies of PPP-B2b on dual-frequencies
    and single-frequency PPP are further studied with static and dynamic tests.
  - The static data from four MGEX stations (URUM, ULAB, WHU2, and JFNG) during DOYs
    of 354–357 of 2021 were collected.
- experiment_id: static_ppp
  description: Static PPP processing of four MGEX stations (JFNG, ULAB, URUM, WUH2)
    using BDS-3 and GPS observations.
  setup: Daily processing, 30 s interval, 10° cutoff angle, elevation-dependent weight,
    reference from MGEX weekly SINEX.
  conditions: BDS-3 IF PPP (B1I+B3I), BDS-3 SF PPP (B1C), GPS IF PPP (L1+L2), GPS
    SF PPP (L1).
  grounding_quotes:
  - all of these orbit and clock products were projected to the same coordinate system
    and time system
  - static test data were processed daily with dual-frequency IF PPP (B1I+B3I and
    L1+L2) and single-frequency PPP (B1C and L1)
  - 'Interval: 30 s'
  - 'Cutoff angle: 10°'
- experiment_id: orbit_clock_assessment
  description: Assessment of real-time orbit and clock products from PPP-B2b (CAS,
    DLR, GFZ, WHU) and broadcast ephemeris for BDS-3 and GPS using WHU final products
    as reference.
  setup: Four MEGX stations used; time series of orbit errors in radial/along/cross-track,
    clock errors; RMSE and STD statistics.
  conditions: Real-time products compared; PPP-B2b corrected BDS and GPS; BDS IGSO
    vs MEO satellites highlighted.
  grounding_quotes:
  - To evaluate the accuracies of PPP-B2b BDS-3 real-time orbits and clocks from CAS,
    DLR, GFZ, and WHU, as well as the broadcast ephemeris objectively, this study
    uses the final precision product from WHU as the reference.
  - The time series of the orbit errors in radial, along-track, and cross-track directions,
    as well as the clock errors, are depicted in Figure 3.
  - the statistic orbit accuracies of the IGSO satellites, C38~C40, are much lower
    than those of MEO satellites, especially while using the SSR corrections from
    GFZ.
- experiment_id: dual_frequency_ppp_eval
  description: Static dual-frequency PPP positioning using PPP-B2b corrections at
    four MGEX stations, comparing accuracy between BDS-3 and GPS solutions.
  setup: Four MGEX stations (JFNG, ULAB, URAM, WUH2) with B1I+B3I BDS-3 and GPS observations,
    corrected by PPP-B2b SSR products.
  conditions: Static mode, dual-frequency, real-time corrections; comparison with
    IGS real-time, WHU ultra-rapid, and broadcast ephemeris.
  grounding_quotes:
  - the B1I+B3I PPP solutions of the four MEGX stations
  - the positioning accuracy of BDS-3 dual-frequency PPP based on the PPP-B2b real-time
    products is within 4.6 cm in the three directions for the four stations.
- experiment_id: four_day_if_static
  description: Four-day static PPP solution using B1I+B3I ionosphere-free combination
    with various real-time correction products including PPP-B2b, IGS RTS (WHU, CAS,
    DLR).
  setup: Static positioning, ionosphere-free combination
  conditions: Data spanning four days
  grounding_quotes:
  - Error series of the four-day IF static PPP solution.
  - The average accuracy of the four-day IF static PPP solution.
  - B1I+B3I PPP using different real-time products
- experiment_id: dual-freq-static-ppp
  description: Static dual-frequency PPP using B1I+B3I with PPP-B2b and other products,
    evaluated at four MGEX stations.
  setup: Four MGEX stations, dual-frequency BDS-3 B1I+B3I observations, PPP-B2b, IGS
    RTS, WHU ultra-rapid, broadcast ephemeris corrections.
  conditions: Static mode, dual-frequency ionosphere-free combination; accuracy assessed
    in E, N, U; convergence time defined as <10 cm horizontal and <20 cm vertical
    for >10 min.
  grounding_quotes:
  - the B1I+B3I BDS-3 PPP based on PPP-B2b SSR corrections
  - 'Table 5. Average dual-frequency PPP positioning accuracy of the four MGEX stations
    (unit: cm).'
  - Convergence time is another crucial index for PPP evaluation. In this paper, we
    define the convergence criteria of static PPP to be that the position accuracies
    in horizontal and vertical are continuously better than 10 cm and 20 cm for at
    least 10 min.
- experiment_id: single-freq-static-ppp
  description: Static single-frequency PPP using BDS B1C and GPS L1 with PPP-B2b and
    other products, evaluated at each station.
  setup: BDS B1C or GPS L1 single-frequency observations, ionospheric and receiver
    DCB constraints, compared with IGS RTS and other products.
  conditions: Static single-frequency PPP model with ionospheric and receiver DCB
    constraints; RMSE evaluated in E, N, U.
  grounding_quotes:
  - a single-frequency PPP model with ionospheric and receiver DCB constraints is
    used.
  - The positioning accuracy in terms of RMSE of BDS B1C PPP with PPP-B2b SSR products
    is better than 5.5 cm in the E, N, and U for each station.
- experiment_id: four_day_single_freq_static
  description: Four-day single-frequency static PPP using PPP-B2b and IGS RTS SSR
    products.
  setup: NOT_MENTIONED
  conditions: Static PPP, single-frequency B1C, PPP-B2b and IGS RTS products evaluated.
  grounding_quotes:
  - Figure 9. Time series of position errors of the four-day single-frequency static
    PPP.
  - According to the statistics of average positioning error in Table 6, single-frequency
    RT-PPP based on PPP-B2b SSR products and IGS RTS SSR products (except DLR) can
    satisfy the demand for centimeter-level high-precision real-time positioning accuracy.
- experiment_id: static_single_freq
  description: Static single-frequency PPP at MGEX stations using different real-time
    and near-real-time SSR products.
  setup: Four MGEX stations (names not specified in chunk), single-frequency B1C and
    L1 processing; reference obtained from post-processed solutions (assumed).
  conditions: Presented in Figures 11 and Table 6; convergence threshold redefined
    as 20 cm horizontal / 40 cm vertical for 10 min.
  grounding_quotes:
  - 'The average positioning accuracy at the four stations (unit: cm).'
  - To present the convergence speed of single-frequency B1C PPP, we redefine the
    convergence criteria of static PPP to be that the position accuracies in horizontal
    and vertical are continuously better than 20 cm and 40 cm for at least 10 min.
- experiment_id: dynamic_vehicle
  description: Real-time vehicle-borne kinematic PPP on the 5th ring road of Beijing
    with GPS+BDS/INS reference, also testing GNSS jamming.
  setup: DOY 357 2021, 06:00-08:30; vehicle covering ~40 km N-S, ~30 km E-W. Equipped
    with NovAtel SPAN EPSON G370 INS and NovAtel receiver (B1I/B2b BDS-3, L1/L2 GPS),
    plus a GNSS jammer to reduce visible satellites.
  conditions: Jamming environment; reference is tight integration of GPS+BDS RTK and
    INS processed by Inertial Explorer.
  grounding_quotes:
  - The dynamic test is carried out on DOY 357 in 2021 from 06:00 to 08:30 on the
    fifth ring road with Inertial Navigation System (INS) (NovAtel SPAN EPSON G370)
    and NovAtel GNSS receiver, which receives the B1I and B2b signal from BDS-3, and
    L1 and L2 signal from GPS.
  - we equipped a GNSS jammer to interfere with the received GNSS signals. The jammer
    reduces the number of visible satellites rather than affecting the observed distances.
  - The tight integration of GPS+BDS RTK and INS provided by Inertial Explorer software
    were used as reference values for the dynamic test
- experiment_id: dynamic_test
  description: Vehicle dynamic test in Beijing
  setup: 4-hour test with a GNSS jammer causing sharp changes in visible satellites
    and PDOP
  conditions: BDS-3 and GPS signals; 1 s interval; cutoff angle 10°; jammer equipped
  grounding_quotes:
  - The number of visible satellites and corresponding PDOP values are presented in
    Figure 13. The average number of visible BDS-3 and GPS satellites during the 4-h
    dynamic test in Beijing are 8.9 and 2.0, respectively, and the average corresponding
    PDOP value of BDS-3 and GPS are 6.3 and 2.4, respectively.
  - The sharp changes in the number of visible satellites are affected by the equipped
    GNSS jammer and further affect the PDOP values.
- experiment_id: dynamic_test
  description: Vehicle-borne dynamic test evaluating dual-frequency (B1i+B2b, L1+L2)
    and single-frequency (L1, B2b) PPP performance using PPP-B2b corrections, compared
    against RTK/INS tight integration solutions.
  setup: Vehicle-borne dynamic test with RTK/INS tight integration as reference. GNSS
    signal blockage observed at certain epochs.
  conditions: Periods of poor observations (visible satellite number dropping to 0)
    leading to positioning discontinuity and PPP re-convergence. Average visible satellite
    number of 8.9 during a sub-period.
  grounding_quotes:
  - Figure 14 presents the time series of position errors of vehicle-borne dual-frequencies
    (B1i+B2b and L1+L2) PPP, single frequency PPP (L1 and B2b) by comparing with the
    RTK/INS tight integration solutions in E, N, and U components.
  - the presence of significant error components coincided with epochs of poor observations,
    which results in positioning discontinuity and further leads to PPP re-convergence.
  - At the period of epochs 3587 and 3588, the visible satellite is 0, and the BDS
    cannot provide continuous positioning results.
- experiment_id: EXP1
  description: Vehicle-borne RT-PPP using different SSR products to analyze dual-
    and single-frequency position errors.
  setup: A vehicle-borne test evaluating position errors over time.
  conditions: NOT_MENTIONED
  grounding_quotes:
  - Time series of position errors of the dual-(a)/single (b)-frequency vehicle-borne
    RT-PPP using different SSR products.
- experiment_id: exp1
  description: Vehicle-borne real-time PPP using dual-frequency and single-frequency
    modes with PPP-B2b, IGS RTS, and broadcast ephemeris products
  setup: Vehicular platform, real-time processing, comparison of multiple SSR products
    (CAS, DLR, GFZ, WHU, WHU_U, BRDC) against BDS-3 PPP-B2b and GPS
  conditions: Dynamic vehicle environment, complex positioning conditions
  grounding_quotes:
  - vehicle-borne real-time dual-frequency PPP using different SSR products are shown
    in Tables 8 and 9.
  - affected by the complex positioning environment
- experiment_id: Exp1_Static_MEGX
  description: Static RT-PPP evaluation using four MEGX stations with BDS-3 B1C/B2b
    observations.
  setup: Four MEGX stations, BDS-3 B1C/B2b signals, PPP-B2b and IGS RTS SSR products.
  conditions: Real-time single-/dual-frequency PPP; static mode.
  grounding_quotes:
  - BDS-3 new signals observations of B1C and B2b from the four MEGX stations
  - the position RMSEs of the four MEGX stations based on PPP-B2b SSR products
- experiment_id: Exp2_Vehicle_Dynamic
  description: Vehicle-borne dynamic RT-PPP test using BDS-3 B1C/B2b observations.
  setup: Vehicle-borne test, BDS-3 B1C/B2b signals, PPP-B2b and IGS RTS SSR products.
  conditions: Dynamic mode; dual-frequency (B1I+B2b) and single-frequency (B2b) tested.
  grounding_quotes:
  - a set of the vehicle-borne test were used
  - the dual-frequency B1I+B2b PPP positioning accuracy in the vehicle-borne test
    achieved submeter-level and meter-level in horizontal and vertical components
