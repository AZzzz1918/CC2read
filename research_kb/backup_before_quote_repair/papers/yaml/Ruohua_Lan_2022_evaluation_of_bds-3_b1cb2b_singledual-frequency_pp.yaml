product_source:
  claimed: PPP-B2b service and IGS RTS products
  actual_product_source: MIXED_PRODUCTS
  correction_stream: PPP-B2b signal (B2b) for BDS-3; IGS RTS streams for CAS, DLR,
    GFZ, WHU
  provider: BDS-3 PPP-B2b service; four IGS centers (CAS, DLR, GFZ, WHU)
  grounding_quotes:
  - This paper provides a comprehensive evaluation of the accuracies of the satellite’s
    precise real-time orbit and clock products, including BDS-3 PPP-B2b precise products
    and the precise real-time products provided by four IGS centers (CAS, DLR, GFZ,
    and WHU).
  - IGS established a real-time working group to provide GPS/GLONASS orbit and clock
    corrections based on RTCM for the RT-PPP service [14,15].
  - Table 1. The IGS SSR message information and the corresponding interval.
  - real-time orbit and clock products provided by broadcast ephemeris, BDS-3 PPP-B2b,
    CAS, DLR, GFZ, and WHU, as well as the ultra-rapid products from WHU.
  - The clock corrections broadcast by PPP-B2b can be recovered to form the precise
    clock
  - The PPP-B2b products are estimated using the real-time observations collected
    by the regional tracking stations in China.
  - PPP-B2b real-time clock
  - The real-time orbit and clock SSR products of PPP-B2b, CAS, DLR, GFZ, and WHU,
    the ultra-rapid products from WHU, and the broadcast ephemeris during the Days
    of Year (DOY) 354–357 in 2021 were collected.
  - The IGS real-time SSR corrections were collected from the internet via the open-source
    software BNC Ver2.12.17
  - all of these orbit and clock products were projected to the same coordinate system
    and time system
  - the reference coordinates obtained from the MGEX weekly SINEX file
  - To evaluate the accuracies of PPP-B2b BDS-3 real-time orbits and clocks from CAS,
    DLR, GFZ, and WHU, as well as the broadcast ephemeris objectively, this study
    uses the final precision product from WHU as the reference.
  - The B2b corrected GPS orbit and clock are also studied as a comparison.
  - the BDS-3 PPP-B2b orbits
  - PPP-B2b SSR products
  - B2b BDS
  - B2b GPS
  - PPP with PPP-B2b service
  - IGS real-time products. Among these solutions, the solution based on the products
    of WHU has the highest accuracy in horizontal components with 1.1 cm. In comparison,
    the solution based on the CAS products has the highest accuracy in 3D with 1.9
    cm. The solutions based on DLR real-time products present the worst accuracy with
    3.5 cm and 3.9 cm
  - the B1I+B3I BDS-3 PPP based on PPP-B2b SSR corrections can provide users with
    centimeter-level static positioning solutions, which is close to these based on
    IGS RTS SSR corrections
  - The PPP-B2b-based GPS PPP presents the slowest convergence time
  - While using GPS L1, the PPP accuracy is better than 5.6 cm in three components.
    The positioning accuracy of single-frequency PPP with PPP-B2b is comparable to
    that of IGS real-time RTS products
  - single-frequency RT-PPP based on PPP-B2b SSR products and IGS RTS SSR products
    (except DLR) can satisfy the demand for centimeter-level high-precision real-time
    positioning accuracy.
  - While using PPP-B2b SSR products, the position accuracies in horizontal and 3D
    of B1C PPP are 5.4 cm and 7.7 cm, respectively.
  - While using the IGS RTS products, the B1C PPP based on WHU products provides the
    highest accuracy within 3.5 cm in horizontal, and the PPP based on GFZ products
    provides the highest accuracy in 3D with 7.0 cm among evaluated the IGS RTS products.
  - horizontal/3D positioning accuracies using WHU ultra-rapid products and broadcast
    ephemeris were about 7.6/13.1 cm and 18.3/43.5 cm, respectively, much lower than
    those of PPP-B2b PPP.
  - the average convergence times of BDS-3 B1C PPP and GPS L1 PPP using PPP-B2b SSR
    products are 80 min and 73 min
  - the converge times with CAS’s products are the shortest among other products,
    with an average time of 65 min. The DLR products-based solutions converge the
    slowest with an average time of 95 min.
  - It should be noted that the satellite DCB products from both real-time SSR and
    IGS final products do not contain the satellite DCB value of C7D (B2b).
  - Satellite DCB Corrected by DCB products
  - the B1I+B2b combination PPP with PPP-B2b converged to 0.5 and 1.0 m positioning
    accuracy in both horizontal and vertical components.
  - using different SSR products
  - BDS-3 B1I+B2b PPP using PPP-B2b SSR products
  - using the SSR product of both PPP-B2b and IGS RTS
  - real-time dual-frequency PPP using different SSR products are shown in Tables
    8 and 9
  - the IGS real-time product positioning accuracy is better than that of PPP-B2b
  - the accuracies of the real-time WHU orbits and clock products
  - the WHU BDS real-time clock products contain systematic errors
  - To evaluate the impacts of existing real-time orbit and clock products (BDS-3
    PPP-Bb and IGS RTS), this study provides comprehensive assessments of the accuracy
    of these real-time products
  - thanks to the original observations provided by MGEX and the multi-system SSR
    products provided by the analysis centers CAS, DLR, GFZ, and WHU.
