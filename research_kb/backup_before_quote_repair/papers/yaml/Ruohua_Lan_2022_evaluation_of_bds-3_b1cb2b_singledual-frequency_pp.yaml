technical_route:
  overall_flow: Evaluate accuracy of real-time orbit and clock products from broadcast
    ephemeris, BDS-3 PPP-B2b, CAS, DLR, GFZ, WHU, and WHU ultra-rapid; then assess
    positioning accuracy of kinematic dual-/single-frequency RT-PPP using B1C+B2b
    data.
  key_steps:
  - NOT_MENTIONED
  - Recovery of PPP-B2b real-time orbit and clock offsets
  - Transformation of orbit corrections to ECEF
  - Dual- and single-frequency PPP modeling
  - Kinematic positioning performance assessment
  - Antenna phase center correction (APC to CoM)
  - PPP-B2b clock recovery using broadcast ephemeris and correction
  - Clock projection to signal frequency using DCB
  - Orbit and clock comparison with WHU final products using single-difference to
    remove system inconsistency
  - Re-edit inter-satellite double-difference clock using WHU final precise clock
    (Eq. 7)
  - Compensate discontinuity in double-difference clock (Eq. 8, 9)
  - Set up RT-PPP observation equations (Eq. 10, 11)
  - Apply ionosphere-free combination for dual-frequency PPP
  - Orbit/clock product coordinate/time system unification
  - Static PPP processing with dual-frequency IF (B1I+B3I, L1+L2)
  - Static PPP processing with single-frequency (B1C, L1)
  - Reference coordinates from MGEX weekly SINEX
  - Evaluation of satellite visibility, PDOP, positioning errors
  - Apply orbit and clock corrections from each product source
  - Form B1I+B3I ionosphere-free combination for dual-frequency PPP
  - Employ single-frequency PPP model with ionospheric and DCB constraints
  - Evaluate positioning accuracy (RMSE) in E, N, U components
  - Compute convergence time following defined 10 cm/20 cm criteria
  - Process single-frequency PPP with PPP-B2b orbit/clock corrections
  - Compute average positioning accuracy (ENU) over four stations
  - Define convergence as horizontal <20 cm, vertical <40 cm for ≥10 min
  - Compare convergence time among different SSR sources
  - Conduct dynamic test on DOY 357 2021 with GNSS jammer
  - Use GPS+BDS RTK/INS tight integration as reference
  - Description of evaluation methods for real-time orbits and clocks
  - Description of real-time single-/dual-frequency PPP models
  - Collection of BDS-3 B1C/B2b observations from MEGX stations and vehicle-borne
    test
  - Comparison of orbit/clock accuracy between PPP-B2b and IGS RTS
  - Assessment of RT-PPP positioning accuracy and convergence time
  tools_software:
  - NOT_MENTIONED
  - BNC Ver2.12.17 for IGS RTS collection
  grounding_quotes:
  - Therefore, this contribution will present a comprehensive performance evaluation
    on the real-time orbit and clock products provided by broadcast ephemeris, BDS-3
    PPP-B2b, CAS, DLR, GFZ, and WHU, as well as the ultra-rapid products from WHU.
    The performance of the kinematic dual-and single-frequency RT-PPP is analyzed
    with B1C+B2b observation data collected in Beijing, China.
  - The clock corrections broadcast by PPP-B2b can be recovered to form the precise
    clock
  - the following method can be adopted to realize such projection
  - the third method is adopted in this paper by using the final products provided
    by WHU as references
  - We re-edited the inter-satellite difference clock using the method proposed by
    [23].
  - the discontinuity is compensated by,
  - The measurements used for RT-PPP are pseudo-range ( P ) and carrier-phase ( L
    )
  - The dual-frequency ionosphere-free combination pseudo-range and carrier-phase
    are used to form the observations of dual-frequency PPP [31]
  - The IGS real-time SSR corrections were collected from the internet via the open-source
    software BNC Ver2.12.17
  - static test data were processed daily with dual-frequency IF PPP (B1I+B3I and
    L1+L2) and single-frequency PPP (B1C and L1)
  - the reference coordinates obtained from the MGEX weekly SINEX file
  - the B1I+B3I BDS-3 PPP based on PPP-B2b SSR corrections
  - a single-frequency PPP model with ionospheric and receiver DCB constraints is
    used
  - In this paper, we define the convergence criteria of static PPP to be that the
    position accuracies in horizontal and vertical are continuously better than 10
    cm and 20 cm for at least 10 min.
  - horizontal/3D positioning accuracies using WHU ultra-rapid products and broadcast
    ephemeris were about 7.6/13.1 cm and 18.3/43.5 cm
  - we redefine the convergence criteria of static PPP to be that the position accuracies
    in horizontal and vertical are continuously better than 20 cm and 40 cm for at
    least 10 min.
  - The dynamic test is carried out on DOY 357 in 2021 from 06:00 to 08:30 on the
    fifth ring road with Inertial Navigation System (INS) (NovAtel SPAN EPSON G370)
    and NovAtel GNSS receiver
  - tight integration of GPS+BDS RTK and INS provided by Inertial Explorer software
    were used as reference values for the dynamic test
  - After the descriptions of the evaluation methods for real-time orbits and clocks
    as well as the real-time single-/dual-frequency PPP models, BDS-3 new signals
    observations of B1C and B2b from the four MEGX stations and a set of the vehicle-borne
    test were used
  - this study provides comprehensive assessments of the accuracy of these real-time
    products and their influences on the positioning accuracy and convergence time
    of RT-PPP in both static and dynamic tests.
