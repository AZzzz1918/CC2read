domain_relevance:
  value: core_ppp_b2b
  reasoning: The paper directly evaluates BDS-3 PPP-B2b precise orbit and clock products
    and their impact on PPP positioning, making PPP-B2b the core research subject.
  grounding_quotes:
  - evaluation of the accuracies of the satellite’s precise real-time orbit and clock
    products, including BDS-3 PPP-B2b precise products
  - IGS established a real-time working group to provide GPS/GLONASS orbit and clock
    corrections based on RTCM for the RT-PPP service [14,15].
  - Different from the internet-based RT-PPP service provided by the IGS, BDS-3 broad-
    casts the correction of satellite orbit and clock for both BDS-3 and GPS via the
    PPP-B2b signal.
  - Therefore, this contribution will present a comprehensive performance evaluation
    on the real-time orbit and clock products provided by broadcast ephemeris, BDS-3
    PPP-B2b, CAS, DLR, GFZ, and WHU, as well as the ultra-rapid products from WHU.
    The performance of the kinematic dual-and single-frequency RT-PPP is analyzed
    with B1C+B2b observation data collected in Beijing, China.
  - The clock corrections broadcast by PPP-B2b can be recovered to form the precise
    clock
  - The PPP-B2b products are estimated using the real-time observations collected
    by the regional tracking stations in China.
  - PPP-B2b real-time clock
  - precise real-time products
