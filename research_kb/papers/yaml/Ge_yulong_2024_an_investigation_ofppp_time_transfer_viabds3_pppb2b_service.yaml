technical_route:
  overall_flow: Collect 29 days of data; analyze orbit and clock quality of PPP-B2b;
    perform PPP time transfer with B2b and CNES products for BDS-3, GPS, and BDS-3/GPS;
    compare results.
  key_steps:
  - Data collection (29 days)
  - Satellite orbit and clock quality analysis (PPP-B2b)
  - PPP time transfer using PPP-B2b (BDS-3, GPS, combined)
  - Comparison with CNES real-time products
  - Combine broadcast ephemeris with PPP-B2b orbit/clock corrections
  - Apply OSB corrections to pseudorange observations
  - Formulate dual-frequency IF observation equations
  - Estimate receiver clock offset for time transfer
  - Decode PPP-B2b corrections from 3 GEO satellite signals
  - Recover precise orbit and clock using broadcast ephemeris and PPP-B2b corrections
  - Apply OSB correction to pseudorange
  - Perform ionosphere-free PPP to estimate receiver clock offset
  - Calculate time difference between BDT and local time, then between stations
  - Recover precise products using PPP-B2b corrections and broadcast ephemeris (LANV,
    CNAV1)
  - Receive CNES real-time products with BNC software
  - Download WUU and WUM products from Wuhan University FTP
  - Perform PPP time transfer for BDS-3, GPS, and combined BDS-3/GPS systems
  - Compare results to IGS final clock products
  - PPP-B2b correction recovery
  - Kalman filter PPP processing using BDS-3/GPS observations
  - Time transfer using estimated receiver clock offsets
  - Comparison with reference products (WUM, WUU, CNES)
  - Evaluation with STD and MDEV metrics
  - After the filter update, check observation residuals for each satellite.
  - If residual exceeds threshold, reduce the weight of the abnormal observation and
    restart the filter.
  - If still not qualified, eliminate the satellite with too large residuals.
  - PPP processing using B2b, CNES, WUM, WUU corrections
  - Time transfer via common clock difference method (Formula 8)
  - Compare availability percentages (Table 3)
  - Compute STD and mean of the difference between time transfer solutions and reference
  - Collection of BDS-3 PPP-B2b corrections over 29 days
  - Recovery of precise orbit and clock products from B2b corrections
  - Quality assessment of GPS and BDS-3 orbit/clock errors using WUM as reference
  - PPP processing with B2b, CNES, WUU, and WUM products for GPS-only, BDS-3-only,
    and combined constellations
  - Convergence time evaluation (horizontal < 0.1 m, vertical < 0.2 m)
  - Time transfer analysis using modified Allan deviation (MDEV) and receiver clock
    offset series
  - Recover satellite clock/orbit corrections from PPP-B2b and other products
  - Perform BDS-3, GPS, and BDS-3/GPS PPP processing
  - Compute receiver clock offsets for stations (e.g., CUSV)
  - Perform time transfer between stations (CUSV-USUD)
  - Evaluate precision (STD) and frequency stability
  tools_software:
  - NOT_MENTIONED
  - BNC software
  - MG-APP
  grounding_quotes:
  - We collected 29 days of experimental data and compared it with the Centre National
    d’Etudes Spatiales (CNES) real-time products. The quality of the satellite's orbit
    and clock was analyzed first. Then, time transfer based on BDS-3, GPS, and BDS-3/GPS
    PPP was investigated.
  - The method of recovery of precise clock offset and orbit will be presented first,
    followed by PPP time transfer with the PPP-B2b.
  - The quality of real-time products will then be assessed and analyzed. Next, the
    experimental dataset and the processing strategies are described in detail. Following
    that is the investigation and validation of PPP time transfer with the PPP-B2b
    correction.
  - For each station, receiving the BDS-3 or GPS pseudorange and phase observation
    and 3 GEO satellite signals for decoding PPP-B2b corrections.
  - Based on BDS-3 CNAV1 and GPS LNAV broadcast ephemeris and decoded the PPP-B2b
    correction, precise orbit and clock offset are then recovered.
  - Note that the OSB correction will be corrected directly for pseudorange at each
    frequency.
  - the time difference between BDT and the local time will be estimated directly
    by using the corresponding PPP model.
  - Finally, the time transfer solutions can be obtained directly using Eq. (8).
  - The precise products will be recovered with LANV and CNAV1 broadcast ephemeris
    and the PPP-B2b correction.
  - The CNES real-time products were received and recovered by BNC software
  - The time transfer based on PPP using the PPP-B2b service was investigated and
    compared with PPP using WUM, WUU, and CNES products.
  - Estimator Kalman filter
  - Receiver clock offset Estimated with a white noise model
  - After the filter update, we check the observation residuals for each satellite.
    If the residual of the certain satellite exceeds, the weight of this abnormal
    observation is reduced, and re-start the filter. If the result is still not qualified,
    we will further eliminate the satellite with too large residuals.
  - the difference in the reference was removed by using (8) for the time transfer
  - Table 3, which exhibits the availability percentages for PPP solutions with each
    precise product
  - the STD and mean values of the difference between time transfer solutions and
    the reference are calculated and listed in Table 4
  - 29-day PPP-B2b corrections were collected and recovered to the precise product.
  - Then, the BDS-3 and GPS orbit and clock released by CNES and PPP-B2b products
    were assessed by using WHU final products (WUM) as the reference.
  - Here, the mean convergence times for PPP with the PPP-B2b, CNES, WUU, and WUM
    products at different schemes are calculated and listed in Table 7.
  - We use the positioning error ... to calculate the convergence time, which is defined
    as the time when the horizontal and the vertical positioning error fall within
    0.1 m and 0.2 m, respectively.
  - Fig. 16   MDEV of time transfer BDS-3 PPP using different products
  - Fig. 17   USUD receiver clock offset from BDS-3, GPS, and BDS-3/ GPS PPP using
    B2b products
  - CUSV receiver clock offset from BDS-3, GPS, and BDS-3/GPS PPP using B2b products
  - CUSV-USUD time transfer from BDS-3, GPS, and BDS-3/GPS BDS-3 PPP using B2b products
  - The precision of time transfer obtained from GPS PPP using the PPP-B2b products
    (0.89 ns) ...
  - The frequency stability of time transfer presents similar conclusions.
  - he open-sourced a GNSS data processing software named MG-APP (https://​geode​sy.​noaa.​gov/​gps-​toolb​ox/;
    https://​github.​com/​xiaog​ongwei/​MG_​APP).
