main_results:
  summary: BDS-3 PPP time transfer with PPP-B2b is feasible (0.30 ns level) and more
    reliable than CNES real-time products, but GPS-only PPP-B2b is not recommended
    and BDS-3/GPS combination brings no significant improvement.
  key_findings:
  - GPS PPP with PPP-B2b is not recommended.
  - BDS-3 PPP using PPP-B2b (referred to as PPP-B2a) achieves 0.30 ns time transfer
    precision.
  - Reliability of PPP-B2b time transfer is better than that using CNES products.
  - BDS-3/GPS combined PPP time transfer precision is not significantly improved over
    BDS-3-only.
  - 'GPS PPP-B2b orbit RMS: (0.10, 0.43, 0.23) m vs CNES (0.02, 0.03, 0.02) m.'
  - 'BDS-3 PPP-B2b clock STD: 0.12 ns vs CNES 0.23 ns.'
  - Average BDS-3 satellite count is significantly higher than GPS in PPP-B2b processing.
  - Epochs with fewer than 3 GPS satellites occur because B2b service does not provide
    corrections for all satellites at every moment.
  - Time series of receiver offset using B2b is disorderly and discontinuous because
    the reference of GPS in B2b is not consistent.
  - Performance of time transfer is not affected by the reference of a precise clock
    product (Eq. 8).
  - Noise of time series from WUU products is larger due to 5 min sampling interval.
  - B2b availability exceeded 99% but was slightly lower than WUM and WUU (which were
    100%).
  - B2b PPP availability is better than CNES real-time products.
  - GPS PPP with B2b has worse STD (0.89 ns) than with WUM (0.12 ns), CNES (0.23 ns),
    WUU (0.50 ns).
  - A systematic bias of ~0.5 ns exists in B2b time transfer, likely due to nonzero
    mean satellite bias.
  - PPP time transfer with B2b correction presents a worse performance in the four
    schemes.
  - The precision of PPP time transfer with CNES products is almost as accurate as
    that of PPP with WUM products, while that of PPP with PPP-B2b correction is poor.
  - GPS-only PPP with B2b products is not recommended for time transfer.
  - 'BDS-3 PPP with WUM, WUU, CNES, and B2b products shows four interesting findings
    (first: jump between days behavior differs from GPS WUM).'
  - BDS-3 PPP with B2b presents very smooth and continuous clock series.
  - Time transfer solutions using B2b agree well with those using other products.
  - 'STD of time transfer difference: B2b 0.30 ns, WUM 0.14 ns, CNES 0.35 ns, WUU
    0.54 ns.'
  - B2b PPP time transfer STD is 0.30 ns vs GPS 0.89 ns.
  - WUM frequency stability outperforms B2b; WUU is the worst.
  - GPS PPP time transfer has large fluctuation due to clock reference discontinuity
    in PPP-B2b service.
  - Systematic bias exists between GPS PPP and BDS-3 PPP time transfer, likely due
    to receiver hardware delay.
  - BDS-3/GPS PPP improved precision only marginally (0.28 ns).
  - PPP-B2b GPS orbit RMS (0.10, 0.43, 0.23) m, while CNES GPS orbit RMS (0.02, 0.03,
    0.02) m in RAC.
  - BDS-3 PPP-B2b orbit RMS (0.07, 0.27, 0.23) m; CNES BDS-3 orbit RMS (0.07, 0.18,
    …).
  - PPP-B2b convergence for BDS-3 only is 39.5 min, for GPS only 65.5 min; dual-system
    shortens by 16.4%.
  - CNES convergence times were 27.5 min (GPS) and 42 min (BDS-3); WUM times were
    23.5 min (GPS) and 26.5 min (BDS).
  - Frequency stability (MDEV) at 15,360 s reached ~8.70e-13 for one of the products.
  - GPS PPP-B2b time transfer precision (0.89 ns) is significantly worse than CNES
    (0.23 ns); not recommended.
  - BDS-3 PPP-B2b time transfer precision (0.30 ns) outperforms CNES (0.35 ns) and
    WUU (0.54 ns).
  - BDS-3 PPP-B2b satellite clock precision (0.12 ns) better than CNES (0.23 ns) due
    to ISL observations.
  - BDS-3/GPS combined PPP slightly improves time transfer precision over BDS-3 alone.
  - Frequency stability of BDS-3, GPS, and BDS-3/GPS PPP around 2.11E-12.
  - 'BDS-3 PPP-B2b has better reliability: sometimes does not re-converge due to Internet
    instability (referring to real-time without internet dependency).'
  - BDS-3/GPS PPP using B2b products provided the best STD (0.26–0.30 ns) compared
    to single-system solutions.
  - BDS-3-only B2b convergence (39.5 min) was faster than GPS-only (65.5 min) but
    slower than WUM and CNES in BDS-3/GPS mode.
  limitations:
  - NOT_MENTIONED
  - Regional network for GPS in PPP-B2b limits GPS orbit accuracy compared to global
    CNES network.
  - Limited to two stations (USUD, CUSV) in this chunk; main time transfer results
    not yet presented.
  - B2b GPS clock reference inconsistency causes discontinuous receiver clock estimates.
  - Only GPS PPP results shown; BDS not evaluated in this page.
  - Poor GPS orbit and clock precision from B2b limits time transfer accuracy.
  - No discussion on B2b correction latency or update interval.
  - GPS clock reference discontinuity in PP-B2b service limits GPS-only PPP time transfer.
  - Systematic bias between GPS and BDS-3 time transfer not fully resolved.
  - Limited to one station (USUD) in the shown results.
  - Only 29 days of data analyzed.
  - GPS PPP-B2b time transfer not recommended due to lower precision and systematic
    bias.
  - No mention of noise floor or long-term stability details in this chunk.
