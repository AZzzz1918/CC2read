  grounding_quotes:
  - An investigation of PPP time transfer via BDS-3 PPP-B2b service
  - Little has been published on time transfer with the PPP-B2b; hence, the performance
    of BDS-3, GPS, and BDS-3/GPS PPP time transfer with the PPP-B2b service will be
    investigated in this contribution.
  - BDS-3, GPS, and BDS-3/GPS PPP time transfer with the PPP-B2b were designed and
    compared with PPP with CNES, WUU, and WUM products.
  - The time transfer based on PPP using the PPP-B2b service was investigated and
    compared with PPP using WUM, WUU, and CNES products.
  - After the filter update, we check the observation residuals for each satellite.
    If the residual of the certain satellite exceeds, the weight of this abnormal
    observation is reduced, and re-start the filter. If the result is still not qualified,
    we will further eliminate the satellite with too large residuals.
  - No explicit novelty claim, method appears to be standard PPP time transfer applied
    to B2b.
  - Overall, we do not recommend time transfer based on GPS PPP with the PPP-B2b service.
  - the time transfer calculated from BDS-3 PPP with the PPP-B2b is feasible and achieves
    a good performance.
