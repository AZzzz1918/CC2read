- experiment_id: exp_time_transfer_comparison
  description: Comparison of time transfer solutions based on BDS-3 PPP using B2b,
    WUM, CNES, and WUU products for station pair CUSV-USUD.
  setup: Receiver clock offsets computed and time transfer differences evaluated.
  conditions: NOT_MENTIONED
  grounding_quotes:
  - The time transfer solutions of CUSV-USUD based on BDS-3 PPP are illustrated in
    Fig. 14.
  - USUD receiver clock offset from PPP BDS-3 in WUM, CNES, WUU, and B2b products
  - CUSV-USUD time transfer with BDS-3 PPP using different products
- experiment_id: exp1
  description: Comparison of BDS-3 PPP time transfer using B2b, CNES, WUM, WUU products
    and GPS/BDS-3/GPS combinations.
  setup: 'Four schemes: B2b, CNES, WUM, WUU; additional analysis on BDS-3, GPS, and
    BDS-3/GPS PPP with B2b products. Reference time transfer from IGS final products.
    Stations USUD and CUSV.'
  conditions: DOY 122–162 (multiple segments), comparison of receiver clock offsets,
    time transfer solutions, MDEV, systematic bias, hardware delay.
  grounding_quotes:
  - 'Table 5   Mean and STD values of the time transfer based on BDS-3 PPP using B2b,
    WUM, and CNES products and the reference (unit: ns)'
  - The characteristic of GPS, BDS-3, and BDS-3/GPS PPP with B2b products is investigated
    and compared.
  - Figures 17 and 18 display the receiver clock offset for USUD and CUSV stations
    by using BDS-3, GPS, and BDS-3/GPS PPP.
- experiment_id: ConvergenceTimeComparison
  description: Comparison of convergence times for PPP with PPP-B2b, CNES, WUU, and
    WUM products for different GNSS schemes.
  setup: GPS-only, BDS-3-only, BDS-3/GPS PPP processing using four product sets; convergence
    defined as positioning error falling within 0.1 m horizontal and 0.2 m vertical.
  conditions: 29 days of data; convergence time evaluated after removing the initial
    filter convergence period.
  grounding_quotes:
  - Here, the mean convergence times for PPP with the PPP-B2b, CNES, WUU, and WUM
    products at different schemes are calculated and listed in Table 7.
  - We use the positioning error rather than the receiver clock offset time series
    to calculate the convergence time, which is defined as the time when the horizontal
    and the vertical positioning error fall within 0.1 m and 0.2 m, respectively.
- experiment_id: TimeTransferPerformance
  description: Evaluation of time transfer frequency stability using MDEV and analysis
    of receiver clock offsets at station USUD.
  setup: BDS-3, GPS, and combined PPP with B2b, CNES, WUU, WUM products; MDEV computed
    from clock offset series.
  conditions: Same 29-day period; clock offsets from PPP solutions.
  grounding_quotes:
  - Fig. 16   MDEV of time transfer BDS-3 PPP using different products
  - Fig. 17   USUD receiver clock offset from BDS-3, GPS, and BDS-3/ GPS PPP using
    B2b products
- experiment_id: Exp_time_transfer
  description: Time transfer comparison using BDS-3, GPS, and BDS-3/GPS PPP with PPP-B2b
    and other precise products. Station pairs CUSV and USUD used.
  setup: CUSV and USUD stations, PPP-B2b corrections, CNES, WUM, WUU products. Figures
    18 and 19 illustrate receiver clock offset and time transfer.
  conditions: NOT_MENTIONED
  grounding_quotes:
  - Fig. 18 CUSV receiver clock offset from BDS-3, GPS, and BDS-3/GPS PPP using B2b
    products
  - Fig. 19 CUSV-USUD time transfer from BDS-3, GPS, and BDS-3/GPS BDS-3 PPP using
    B2b products
  - the precision of BDS-3/GPS PPP time transfer was slightly improved
- experiment_id: time_transfer_comparison
  description: Comparison of PPP time transfer using B2b products against CNES, WUU,
    WUM products and IGS final clocks, and assessment of convergence time for static
    PPP.
  setup: Static PPP with two stations CUSV and USUD, using GPS, BDS-3, and combined
    BDS-3/GPS constellations.
  conditions: Time transfer evaluated for DOY ranges 122-131, 144-153, 153-162.
  grounding_quotes:
  - CUSV-USUD clock difference between time transfer from BDS-3, GPS, and BDS-3/GPS
    BDS-3 PPP using B2b products and time transfer from IGS final clock products.
  - The mean convergence time for the two stations with the PPP-B2b, CNES, WUU, and
    WUM products in static PPP
