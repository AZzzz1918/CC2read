research_problem:
  problem_statement: Investigation of real-time PPP time transfer using BDS-3 PPP-B2b
    service and comparison with CNES real-time products.
  research_questions:
  - Feasibility and precision of time transfer via BDS-3 PPP-B2b with BDS-3, GPS,
    and BDS-3/GPS
  - Comparison of reliability between PPP-B2b and CNES real-time products
  - How does PPP time transfer with PPP-B2b perform for BDS-3, GPS, and BDS-3/GPS?
  - What is the quality of precise orbit and clock products recovered from PPP-B2b?
  - How well does PPP-B2b-based time transfer perform?
  - What is the precision of PPP-B2b orbit and clock corrections for GPS and BDS-3?
  - Can PPP-B2b enable real-time PPP time transfer with acceptable accuracy?
  - How does BDS-3 PPP-B2b perform for GNSS time transfer?
  - How does PPP-B2b compare to CNES real-time, WUU ultra-rapid, and WUM final products?
  - What is the noise level (STD) of PPP-B2b time transfer?
  - How does PPP-B2b time transfer perform in the frequency domain (MDEV)?
  - How many satellites are available for GPS-only, BDS-3-only, and combined PPP with
    B2b products?
  - How does PPP time transfer using B2b compare with IGS RTS (CNES) and post-processed
    products in reliability?
  - What is the precision of B2b-based GPS PPP time transfer relative to other products?
  - What is the precision of BDS-3 PPP time transfer using B2b products compared to
    other products?
  - How does BDS-3/GPS combination perform in PPP time transfer with B2b?
  - What is the frequency stability of BDS-3 PPP time transfer using different products?
  - What is the quality of PPP-B2b orbit and clock corrections compared to CNES and
    WUM products?
  - What is the convergence time of PPP using BDS-3 PPP-B2b corrections for GPS-only,
    BDS-3-only, and combined BDS-3/GPS?
  - How does the frequency stability of time transfer compare among different products?
  - Is time transfer based on GPS PPP with PPP-B2b service feasible?
  - How does BDS-3 PPP time transfer using PPP-B2b compare with other precise products?
  - Does multi-GNSS (BDS-3/GPS) improve time transfer?
  knowledge_gap: The opportunity to use the new BDS-3 PPP-B2b service for real-time
