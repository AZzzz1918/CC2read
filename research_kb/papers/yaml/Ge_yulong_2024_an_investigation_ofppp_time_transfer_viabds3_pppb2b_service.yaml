experiments:
- experiment_id: exp1
  description: Time transfer experiment comparing PPP-B2b and CNES real-time products
    over 29 days.
  setup: NOT_MENTIONED
  conditions: NOT_MENTIONED
  grounding_quotes:
  - We collected 29 days of experimental data and compared it with the Centre National
    d’Etudes Spatiales (CNES) real-time products.
- experiment_id: product_quality_eval
  description: Evaluation of orbit and clock precision from PPP-B2b vs. WUM final
    and CNES real-time products over 29 days in 2022.
  setup: Compare PPP-B2b recovered products with WUM final products; also CNES real-time
    products included. RMS of orbit errors in RAC direction computed.
  conditions: 29 days, DOY 122–131 and DOY 144–162, 2022. Data from BDS-3 and GPS
    satellites.
  grounding_quotes:
  - 29 days, from DOY 122 to 131, 2022 and from DOY 144 to 162, 2022, precise products
    recovered from the PPP-B2b are compared and evaluated with WUM final products
    released from Wuhan University, China.
  - The RMSs of BDS-3 and GPS orbit errors for the CNES real-time products and PPP-B2b
    are presented in Figs. 1 and 2 and listed in Table 1
- experiment_id: exp1
  description: Real-time PPP time transfer experiment using BDS-3 PPP-B2b service
  setup: Two MGEX stations USUD and CUSV in Asia-Pacific; USUD equipped with an H-maser
    atomic clock.
  conditions: PPP-B2b real-time corrections compared with CNES real-time products;
    dual-constellation GPS and BDS-3.
  grounding_quotes:
  - Since there are not many GNSS stations connected to an atomic clock in the Asia–Pacific
    region for time transfer, we only chose 2 GNSS stations, namely USUD and CUSV
    (Fig. 5). USUD is equipped with an H-master clock.
- experiment_id: time_transfer_comparison
  description: PPP time transfer evaluation using BDS-3, GPS, and BDS-3/GPS with PPP-B2b,
    CNES, WUU, and WUM products on two MGEX stations.
  setup: MGEX stations CUSV and USUD; data from DOY 122–131 and 144–162, 2022; first
    day excluded for convergence.
  conditions: Internet interruption caused missing data DOY 132–143; time reference
    = IGS final clock products.
  grounding_quotes:
  - The observations cover 29 days from DOY 122 to 131, 2022, and from DOY 144 to
    162, 2022.
  - BDS-3, GPS, and BDS-3/GPS PPP time transfer with the PPP-B2b were designed and
    compared with PPP with CNES, WUU, and WUM products.
  - the time transfer solutions from the IGS final clock products were set as the
    time standard.
- experiment_id: exp_satellite_availability
  description: Display number of satellites used in PPP with B2b products at two stations
    (USUD, CUSV) for GPS-only, BDS-3-only, and combined.
  setup: PPP processing with BDS-3/GPS signals; MEO/GEO weighting ratio 10:1 for BDS-3.
  conditions: Epochs where GPS satellites under 3 also occurred; some satellites missing
    due to B2b service not providing corrections for all satellites.
  grounding_quotes:
  - we give the number of satellites involved in PPP with B2b products at two stations
    and display it in Fig. 6.
  - The average numbers of satellites involved in PPP are (5.2, 6.9, 11.2) at station
    USUD and (5.3, 7.5, 12.2) at station CUSV for GPS-only, BDS-3-only, and BDS-3/GPS.
  - MEO and GEO weighting ratio is 10:1 for BDS-3 PPP processing.
- experiment_id: clock_offset_comparison
  description: Comparison of receiver clock offsets estimated from GPS PPP using four
    different products (WUM, CNES, WUU, B2b) at stations CUSV and USUD over 29 days.
  setup: GPS-only PPP with filter update and residual checking. Data from DOYs 122-131,
    144-153, 153-162.
  conditions: Four precise products compared; residual-based QC applied.
  grounding_quotes:
  - receiver clock offset for 29 days at CUSV and USUD stations
  - the receiver clock offset based on the four products does not coincide very well
  - After the filter update, we check the observation residuals
  - Table 3   Availability percentages for PPP solutions with each precise product
    (%)
  - 'DOY

    122–131

    144–153

    153–162'
- experiment_id: exp_time_transfer_comparison
  description: Comparison of GPS PPP time transfer across three arcs using B2b, CNES
    real-time, WUM, and WUU products.
  setup: Stations CUSV and USUD; GPS observations; time transfer solutions compared
    to IGS final clock products as reference.
  conditions: Internet-based CNES product availability ~95-97% when network is good;
    B2b availability higher.
  grounding_quotes:
  - Fig. 9   CUSV-USUD clock difference obtained from GPS PPP using WUM, CNES, WUU,
    and B2b products
  - the availability percentages for PPP solutions with B2b are better than that of
    PPP with CNES
  - the mean STD values of the difference for three arcs obtained from PPP with WUM,
    CNES, and WUU products
- experiment_id: exp_time_transfer_comparison
  description: Comparison of GPS PPP time transfer using B2b, WUM, CNES, WUU products
