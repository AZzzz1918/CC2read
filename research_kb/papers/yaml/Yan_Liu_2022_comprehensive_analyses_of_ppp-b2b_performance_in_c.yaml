main_results:
  summary: PPP-B2b service achieves cm-level static and dm-level kinematic positioning in China and surrounding areas. Overall positioning performance slightly better than WHU real-time products within the service area.
  key_findings:
  - BDS-3 broadcast orbit accuracy similar to PPP-B2b real-time orbit (cm-level difference due to ISL support)
  - 'PPP-B2b clock correction significantly improves broadcast clock offset precision (STD: 0.124ns vs 0.672ns)'
  - 'Large SISRE of PPP-B2b (1.24m) caused by satellite-specified systematic clock bias, not orbit error'
  - 'DCB corrections: STD 0.46-0.54ns, with constant biases on B1Cp (2ns) and B2ap (10ns)'
  - 'Static PPP: cm-level accuracy in all 8 stations (3D RMSE: 3.9-8.3cm for B2b PPP)'
  - Availability degrades from 88.76% (center) to 60.91% (boundary)
novelty_audit:
  audit_grade: B_INCREMENTAL
  rationale: Most comprehensive PPP-B2b evaluation at time of publication. Extends prior studies by evaluating stations beyond China territory (Korea, Japan, Mongolia), presenting detailed matching strategy, full DCB evaluation, and systematic comparison with WHU real-time products.
